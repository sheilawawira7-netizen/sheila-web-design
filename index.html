<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SheShe Web Studio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Fonts for High-End Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

    <style>
        /* Modern Color Palette & Variables */
        :root {
            --bg-color: #faf6f0;       /* Soft luxury cream background */
            --accent-light: #f4eae1;   /* Light tint of the accent color */
            --gradient: linear-gradient(135deg, #1e1616 0%, #3a2e2b 100%);
            --primary: #1e1616;
            --accent: #d4a373;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background: var(--bg-color);
            color: var(--primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- High-End Luxury Hero Header --- */
        header {
            color: white;
            padding: 120px 20px;
            text-align: center;
            border-bottom: 5px solid var(--accent);
            position: relative;
            overflow: hidden;
        }

        /* Beautiful background image layer that fixes the layout issue */
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(30, 22, 22, 0.75), rgba(30, 22, 22, 0.95)), url('https://images.unsplash.com/photo-1573496584218-a687353f46f3?q=80&w=1200&auto=format&fit=crop');
            background-size: cover;
            background-position: center 20%;
            background-repeat: no-repeat;
            z-index: 0; /* Keeps the photo perfectly in the background */
        }

        /* Essential rule: This guarantees your text sits sharply on top of the photo */
        header > * {
            position: relative;
            z-index: 1;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 54px;
            margin: 0 0 10px 0;
            line-height: 1.1;
        }

        header p {
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <header>
        <h1>SheShe Web Studio</h1>
        <p>Crafting high-end, visual digital experiences with a premium aesthetic.</p>
    </header>

</body>
</html>
